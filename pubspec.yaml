name: flutter_altheacare_pharmacy
description: "AltheaCare Pharmacy Partner App - Critical Verification Layer"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  # State Management & DI (using your working versions)
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3

  # Code Generation (using your working versions)
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Navigation (using your working version)
  go_router: ^17.0.1

  # UI & Design
  google_fonts: ^7.0.2
  flutter_svg: ^2.2.3
  flutter_animate: ^4.5.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.2

  # Functional Programming
  dartz: ^0.10.1

  # Signature Capture
  signature: ^5.5.0

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # Local Storage (Offline-first)
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Shimmer effect
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation (using your working versions)
  build_runner: ^2.10.2
  riverpod_generator: ^3.0.3
  freezed: ^3.2.3
  json_serializable: ^6.11.1
  go_router_builder: ^4.1.3

  # Linting (using your working version)
  flutter_lints: ^6.0.0
  riverpod_lint: ^3.0.3

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/icons/
    - assets/illustrations/
